<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - LLamala Store</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            color: #333;
        }
        header, nav, footer {
            background-color: #000080;
            color: white;
            padding: 10px 20px;
        }
        nav a, footer a {
            color: white;
            margin-right: 15px;
            text-decoration: underline;
        }
        main {
            padding: 20px;
        }
        section {
            display: block; 
        }
        article {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            width: 250px;
            display: inline-block;
            vertical-align: top;
            margin-right: 20px;
        }
        img {
            max-width: 100%;
            display: block;
            margin-bottom: 10px;
        }
        form {
            border: 1px solid #ccc;
            padding: 15px;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            box-sizing: border-box;
        }
        footer {
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>LLamala Store</h1>
    <p>Bienvenido a nuestra tienda</p>
</header>

<nav>
    <a href="index.html">Inicio</a>
    <a href="catalogo.html">Catálogo</a>
    <a href="servicios.html">Servicios</a>
    <a href="contacto.html">Contacto</a>
</nav>

<main>
    <h2>Contáctanos</h2>
    <form action="#">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="form-group">
            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="correo" required>
        </div>
        <div class="form-group">
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
        </div>
        <button type="submit">Enviar</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 - Todos los derechos reservados</p>
    <p><a href="https://wa.me/51977507037" target="_blank">WhatsApp</a></p>
</footer>

</body>
</html>
